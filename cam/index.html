<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Camera ao vivo | Bem Barato</title>
  <meta name="description" content="Transmissao ao vivo da camera Bem Barato.">
  <link rel="preconnect" href="https://bembarato.shop">
  <link rel="stylesheet" href="./assets/styles.css">
  <script src="./config.js"></script>
</head>
<body>
  <main class="camera-shell">
    <header class="topbar">
      <div>
        <p class="eyebrow">Bem Barato</p>
        <h1>Camera ao vivo</h1>
      </div>
      <div class="status" id="status">
        <span class="status-dot" aria-hidden="true"></span>
        <span id="status-text">Conectando</span>
      </div>
    </header>

    <section class="viewer" aria-label="Imagem da camera ao vivo">
      <iframe
        id="camera-frame"
        title="Camera ao vivo"
        allow="autoplay; fullscreen; picture-in-picture"
        referrerpolicy="no-referrer"
      ></iframe>
      <div class="fallback" id="fallback" hidden>
        <h2>Stream indisponivel</h2>
        <p>O site carregou, mas o endpoint publico da camera ainda nao respondeu.</p>
        <a id="fallback-link" href="#" target="_blank" rel="noopener">Abrir transmissao</a>
      </div>
    </section>

    <footer class="footer">
      <span id="camera-label">camera_xmeye_h264</span>
      <button type="button" id="reload-button">Atualizar</button>
    </footer>
  </main>

  <script src="./assets/app.js"></script>
</body>
</html>
